<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AudioDeck</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="panel">
        <section class="mix-panel" aria-label="Master volume controls">
          <div class="status-row">
            <div>
              <span class="label">Master output</span>
              <strong id="volumeValue">--%</strong>
            </div>

            <button id="muteButton" type="button">Mute</button>
          </div>

          <div class="slider-shell">
            <div class="slider-topline">
              <label class="slider-label" for="volumeSlider">Mixtape fader</label>
              <span class="slider-hint">Drag for live volume</span>
            </div>

            <div class="slider-lane">
              <span class="slider-mark">00</span>
              <input id="volumeSlider" type="range" min="0" max="100" value="0" aria-label="Master volume">
              <span class="slider-mark">100</span>
            </div>
          </div>
        </section>

        <p id="message" class="message" aria-live="polite"></p>
      </section>
    </main>

    <script src="/app.js" defer></script>
  </body>
  </html>
